general {
    disable_loading_bar = true
    hide_cursor         = false
    grace               = 0
    no_fade_in          = false
    no_fade_out         = false
    ignore_empty_input  = true
}

animations {
    enabled   = true
    animation = global,           1, 0.8, default
    animation = fadeIn,           1, 0.8, default
    animation = fadeOut,          1, 0.5, default
    animation = inputFieldFadeIn, 1, 1.0, default
    animation = labelFadeIn,      1, 1.0, default
}

# ── BACKGROUND ───────────────────────────────────────────────────────────────
background {
    monitor     =
    path        = ~/.cache/current-wallpaper
    blur_passes = 1
    blur_size   = 4
    brightness  = 0.75
    contrast    = 0.9
    vibrancy    = 0.15
}

# ── SUBTLE CIRCLE VIGNETTE ───────────────────────────────────────────────────
shape {
    monitor     =
    size        = 580, 580
    color       = rgba(ffffff07)
    rounding    = -1
    border_size = 0
    position    = 0, 40
    halign      = center
    valign      = center
}

# ── CLOCK ────────────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date '+%H : %M')"
    color       = rgba(ffffffff)
    font_size   = 80
    font_family = JetBrains Mono Bold
    position    = 0, 60
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_size   = 10
    shadow_color  = rgba(00000055)
}

# ── DATE ─────────────────────────────────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date '+%A, %B %-d')"
    color       = rgba(ffffffaa)
    font_size   = 17
    font_family = JetBrains Mono
    position    = 0, -10
    halign      = center
    valign      = center
}

# ── PASSWORD INPUT ────────────────────────────────────────────────────────────
input-field {
    monitor           =
    size              = 260, 46
    outline_thickness = 1
    dots_size         = 0.25
    dots_spacing      = 0.22
    dots_center       = true
    outer_color       = rgba(ffffff30)
    inner_color       = rgba(00000055)
    font_color        = rgba(ffffffff)
    fade_on_empty     = true
    fade_timeout      = 2000
    placeholder_text  = <span foreground="##ffffff55"><i>enter password</i></span>
    rounding          = 14
    check_color       = rgba(ffffff88)
    fail_color        = rgba(ff6b6bbb)
    fail_text         = <i>wrong password ($ATTEMPTS)</i>
    capslock_color    = rgba(ffd700bb)
    position          = 0, -80
    halign            = center
    valign            = center
}

# ── POWER BUTTON (bottom right) ──────────────────────────────────────────────
shape {
    monitor      =
    size         = 64, 64
    color        = rgba(00000066)
    rounding     = 16
    border_size  = 1
    border_color = rgba(ffffff25)
    position     = -40, 40
    halign       = right
    valign       = bottom
    zindex       = 10
    onclick      = /bin/bash /home/arch/.config/scripts/hyprlock-power.sh
}

label {
    monitor     =
    text        = ⏻
    color       = rgba(ffffffcc)
    font_size   = 20
    font_family = Symbols Nerd Font
    position    = -40, 37
    halign      = right
    valign      = bottom
    zindex      = 5
}
