# --- MONITOR ---
monitor=,preferred,auto,1

# --- AUTOSTART ---
exec-once = /usr/bin/quickshell
exec-once = mako
exec-once = awww-daemon
exec-once = bash -c 'sleep 0.5 && WP=$(readlink -f ~/.cache/current-wallpaper 2>/dev/null) && [ -f "$WP" ] && awww img "$WP" --transition-type none'
exec-once = hyprsunset --temperature 3000

# --- INPUT ---
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

# --- GENERAL ---
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 0
    layout = dwindle
}


# --- DECORATION ---
decoration {
    rounding = 12

    blur {
        enabled = true
        size = 5
        passes = 2
        noise = 0.01
        contrast = 0.9
        brightness = 0.85
        vibrancy = 0.1
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0,0,0,0.4)
    }
}

# --- KEYBINDS ---
$mainMod = SUPER

# Essentials
bind = $mainMod, Return, exec, kitty
bind = $mainMod, Q, killactive, 
bind = $mainMod, E, exec, dolphin
bind = $mainMod, V, togglefloating, 
bind = $mainMod, M, exit, 

# Wallpaper Picker (Super + W)
bind = $mainMod, W, exec, [float;size 1400 820;center] python3 $HOME/.config/wallpaper-picker/picker.py

# Rofi App Launcher (Super + D)
bind = $mainMod, D, exec, rofi -show drun -steal-focus

# Mouse — Super + LMB drag, Super + RMB resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Fullscreen binds
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0

# Window Navigation
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Workspaces (1-8)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8

# Move active window to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8

# Volume keys
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,     exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Screenshot — bindl so they work through the lock screen too
bindl  = , Print,       exec, grimblast --freeze copy area
bindl  = SHIFT, Print,  exec, grimblast save screen - | satty --filename -

# Lock Screen (Super + L)
bind = $mainMod, L, exec, bash -c 'python3 /home/arch/.config/scripts/lockscreen.py &>/tmp/lockscreen.log'

# Stop all media playback (F8)
bind = , F8, exec, playerctl stop

# Reload quickshell (Super + R)
bind = $mainMod, R, exec, pkill quickshell; sleep 0.2 && quickshell


# Power popup window rules (desktop power menu, independent of lock screen)
windowrule {
    name        = powerpopup
    match:title = ^powerpopup$
    float       = true
    move        = 100%-230 100%-290
    size        = 190 215
    border_size = 0
}

